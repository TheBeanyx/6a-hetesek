<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <title>6.A Hetesek</title>
    <style>
        :root {
            --bg: #050a14; 
            --bg-gradient: radial-gradient(circle at center, #111827 0%, #050a14 100%);
            --card: #111827; 
            --accent: #00f6ff;
            --error: #ff4444; 
            --success: #00ff88; 
            --text: #e2e8f0;
            --input-bg: #070c16;
            --input-border: #333;
        }

        [data-theme="light"] {
            --bg: #f0f2f5;
            --bg-gradient: radial-gradient(circle at center, #ffffff 0%, #e5e7eb 100%);
            --card: #ffffff;
            --accent: #0070f3; 
            --text: #1f2937;
            --input-bg: #f9fafb;
            --input-border: #d1d5db;
        }

        body {
            margin: 0; font-family: 'Lora', sans-serif;
            background: var(--bg-gradient);
            color: var(--text); display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 20px; overflow-x: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        @keyframes zoomFade { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes glowPulse { 0% { box-shadow: 0 0 5px var(--accent); } 50% { box-shadow: 0 0 20px var(--accent); } 100% { box-shadow: 0 0 5px var(--accent); } }

        h1 { 
            color: var(--accent); text-transform: uppercase; letter-spacing: 4px; 
            text-shadow: 0 0 15px rgba(0, 246, 255, 0.4);
            animation: zoomFade 0.6s ease;
            text-align: center; margin-bottom: 10px;
        }

        #current-date { 
            font-size: 1.1rem; opacity: 0.8; margin-bottom: 25px; 
            animation: zoomFade 0.8s ease; text-align: center;
        }

        .display-container, .tasks-container {
            background: var(--card); border: 1px solid var(--accent);
            border-radius: 25px; padding: 30px; width: 100%; max-width: 450px;
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            animation: slideInUp 0.8s ease;
            margin-bottom: 20px;
            transition: background 0.3s ease, border 0.3s ease;
        }

        .name-box {
            font-size: 2.2rem; font-weight: 800; padding: 18px; margin: 12px 0;
            background: rgba(128, 128, 128, 0.05); border-radius: 15px; 
            border-left: 6px solid var(--accent); transition: 0.4s;
        }

        .tasks-container h3 { color: var(--accent); margin-top: 0; text-transform: uppercase; }
        .task-list { text-align: left; padding-left: 20px; font-size: 0.95rem; line-height: 1.6; }
        .task-list li { margin-bottom: 8px; list-style-type: '⚡ '; }

        .top-controls { position: fixed; top: 20px; right: 20px; display: flex; gap: 10px; align-items: center; z-index: 100; }
        
        button, .auth-btn {
            background: var(--card); border: 1px solid var(--accent); color: var(--accent);
            padding: 8px 12px; border-radius: 10px; cursor: pointer; font-weight: bold;
            transition: all 0.2s ease;
        }
        button:hover { background: var(--accent); color: #000; transform: translateY(-2px); }
        button:active { transform: translateY(0); }

        #auth-trigger { 
            width: 45px; height: 45px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; animation: glowPulse 2s infinite; 
            padding: 0; cursor: pointer; border: 1px solid var(--accent); background: var(--card);
        }

        #logout-btn { display: none; background: var(--error); color: white; border: none; }

        #news-trigger {
            position: fixed; bottom: 20px; left: 20px;
            background: var(--card); border: 1px solid var(--accent); color: var(--accent);
            width: 50px; height: 50px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
            z-index: 1000; transition: 0.3s;
        }
        #news-panel {
            position: fixed; bottom: 80px; left: 20px;
            background: var(--card); border: 1px solid var(--accent);
            width: 280px; border-radius: 15px; padding: 20px;
            display: none; flex-direction: column; gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideInUp 0.4s ease; z-index: 1000;
        }

        #admin-controls { display: none; gap: 15px; justify-content: center; margin-top: 25px; animation: zoomFade 0.5s ease; }
        .nav-btn { background: var(--accent); color: #000; border: none; width: 50px; height: 50px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        #super-panel { display: none; width: 100%; max-width: 450px; margin-top: 25px; background: rgba(0,0,0,0.5); border-radius: 20px; padding: 20px; border: 1px dashed var(--accent); animation: slideInUp 0.6s ease; }
        .user-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #222; }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid var(--accent); padding: 15px 30px; border-radius: 50px; display: none; z-index: 2000; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 1000; align-items: center; justify-content: center; }
        .modal { background: var(--card); border: 1px solid var(--accent); padding: 30px; border-radius: 25px; width: 320px; animation: zoomFade 0.3s ease; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text); border-radius: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div id="news-trigger" onclick="toggleNews()">📢</div>
    <div id="news-panel">
        <h4 style="margin:0; color:var(--accent);">Újdonságok</h4>
        <div id="news-content" style="font-size:0.85rem;">
            • Kijelentkezés funkció 🚪<br>
            • Interaktív gombok ✨<br>
            • Gyorsabb Enter-es belépés ⌨️
        </div>
    </div>
    
    <div class="top-controls">
        <button id="logout-btn" onclick="handleLogout()">Logout</button>
        <button id="theme-switch" onclick="toggleTheme()">🌓</button>
        <button id="lang-switch" onclick="toggleLang()">HU / EN</button>
        <div id="auth-trigger" onclick="openModal('login-modal')">🔑</div>
    </div>

    <h1 id="main-title">Osztály Hetesei</h1>
    <div id="current-date">----. --. --.</div>

    <div class="display-container">
        <div id="names-area">
            <div class="name-box">-</div>
            <div class="name-box">-</div>
        </div>
        <div id="admin-controls">
            <button class="nav-btn" onclick="step(-1)">&lt;</button>
            <button class="nav-btn" onclick="step(1)">&gt;</button>
        </div>
    </div>

    <div class="tasks-container">
        <h3 id="tasks-title">A hetes feladatai</h3>
        <ul class="task-list" id="task-list"></ul>
    </div>

    <div id="super-panel">
        <h3 id="super-title" style="color:var(--accent); margin-top:0;">👑 Admin Jogok</h3>
        <div id="user-list"></div>
    </div>

    <div id="login-modal" class="modal-overlay">
        <div class="modal">
            <h2 id="login-title" style="color:var(--accent)">Belépés</h2>
            <input type="text" id="l-user" placeholder="Név">
            <input type="password" id="l-pass" placeholder="Jelszó" onkeypress="if(event.key==='Enter') handleLogin()">
            <button onclick="handleLogin()" style="width:100%; background:var(--accent); color:#000; border:none; padding:12px; margin-top:10px;">BELÉPÉS</button>
            <p onclick="openModal('reg-modal')" style="cursor:pointer; text-align:center; color:var(--accent); font-size:0.9rem; margin-top:15px;">Még nincs fiókom</p>
            <button onclick="closeModals()" style="width:100%; background:transparent; border:none; margin-top:5px; opacity:0.6;">Mégse</button>
        </div>
    </div>

    <div id="reg-modal" class="modal-overlay">
        <div class="modal">
            <h2 id="reg-title" style="color:var(--accent)">Regisztráció</h2>
            <input type="text" id="r-user" placeholder="Név">
            <input type="password" id="r-pass" placeholder="Jelszó">
            <input type="password" id="r-pass2" placeholder="Jelszó újra" onkeypress="if(event.key==='Enter') handleRegister()">
            <button onclick="handleRegister()" style="width:100%; background:var(--accent); color:#000; border:none; padding:12px;">REGISZTRÁCIÓ</button>
            <button onclick="openModal('login-modal')" style="width:100%; background:transparent; border:none; margin-top:10px; opacity:0.6;">Vissza</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, getDoc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCTBGoX-vztuuxOzLz7gkFA4bqiMvKuEwI",
            authDomain: "hetesek-6.firebaseapp.com",
            projectId: "hetesek-6",
            storageBucket: "hetesek-6.firebasestorage.app",
            messagingSenderId: "429344638911",
            appId: "1:429344638911:web:a4dc1bedc94caad6d1830a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "osztaly", "beallitas");
        
        let currentLang = 'hu';
        let currentUser = null;

        function updateDateDisplay() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('current-date').innerText = now.toLocaleDateString(currentLang === 'hu' ? 'hu-HU' : 'en-US', options);
        }
        updateDateDisplay();

        window.toggleNews = () => {
            const panel = document.getElementById('news-panel');
            panel.style.display = (panel.style.display === 'flex') ? 'none' : 'flex';
        };

        window.toggleTheme = () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const targetTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', targetTheme);
            localStorage.setItem('theme', targetTheme);
        };
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);

        const translations = {
            hu: {
                title: "Osztály Hetesei",
                tasksTitle: "A hetes feladatai",
                tasks: ["Osztály takarítása 🧹", "Tábla letörlése 🧼", "Ablakok bezárása a nap végén 🪟", "Székek felrakása 🪑", "Hiányzók számon tartása 📝", "5 perc után a tanár értesítése 🔔"],
                login: "Belépés", reg: "Regisztráció", super: "Admin Jogok", notifyLogin: "Üdvözöljük, ", notifyWeek: "Hét módosítva!"
            },
            en: {
                title: "Class Monitors",
                tasksTitle: "Monitor's Duties",
                tasks: ["Cleaning the classroom", "Cleaning the board", "Closing windows at the end of day", "Putting chairs on desks", "Keeping track of absentees", "Notify teacher after 5 mins"],
                login: "Login", reg: "Sign Up", super: "Admin Rights", notifyLogin: "Hello, ", notifyWeek: "Week updated!"
            }
        };

        window.toggleLang = () => {
            currentLang = currentLang === 'hu' ? 'en' : 'hu';
            updateUI();
            updateDateDisplay();
        };

        function updateUI() {
            const t = translations[currentLang];
            document.getElementById('main-title').innerText = t.title;
            document.getElementById('tasks-title').innerText = t.tasksTitle;
            document.getElementById('login-title').innerText = t.login;
            document.getElementById('reg-title').innerText = t.reg;
            document.getElementById('super-title').innerText = t.super;
            const list = document.getElementById('task-list');
            list.innerHTML = t.tasks.map(task => `<li>${task}</li>`).join('');
        }

        function notify(msg, color = 'var(--accent)') {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.borderColor = color;
            t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 3000);
        }

        window.openModal = (id) => { closeModals(); document.getElementById(id).style.display = 'flex'; };
        window.closeModals = () => document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');

        window.handleLogin = async () => {
            const user = document.getElementById('l-user').value.trim();
            const pass = document.getElementById('l-pass').value;
            if(!user || !pass) return notify("Töltsd ki mindkét mezőt!", "var(--error)");

            const uSnap = await getDoc(doc(db, "felhasznolok", user));
            if (uSnap.exists() && uSnap.data().jelszo === pass) {
                currentUser = uSnap.data();
                closeModals();
                notify(translations[currentLang].notifyLogin + user + "!");
                document.getElementById('auth-trigger').innerText = "👤";
                document.getElementById('logout-btn').style.display = 'block';
                if (currentUser.rang === "admin") document.getElementById('admin-controls').style.display = 'flex';
                if (user === "Buzás Benedek") { loadUserList(); document.getElementById('super-panel').style.display = 'block'; }
            } else { notify("Hibás név vagy jelszó!", "var(--error)"); }
        };

        window.handleLogout = () => {
            currentUser = null;
            document.getElementById('auth-trigger').innerText = "🔑";
            document.getElementById('logout-btn').style.display = 'none';
            document.getElementById('admin-controls').style.display = 'none';
            document.getElementById('super-panel').style.display = 'none';
            notify("Kijelentkezve");
        };

        window.handleRegister = async () => {
            const user = document.getElementById('r-user').value.trim();
            const p1 = document.getElementById('r-pass').value;
            const p2 = document.getElementById('r-pass2').value;
            if(p1 === p2 && p1.length >= 8) {
                await setDoc(doc(db, "felhasznolok", user), { nev: user, jelszo: p1, rang: "user" });
                notify("Sikeres regisztráció!", "var(--success)");
                openModal('login-modal');
            } else { notify("A jelszavak nem egyeznek vagy túl rövidek!", "var(--error)"); }
        };

        async function loadUserList() {
            const querySnapshot = await getDocs(collection(db, "felhasznolok"));
            const listDiv = document.getElementById('user-list');
            listDiv.innerHTML = "";
            querySnapshot.forEach((uDoc) => {
                const data = uDoc.data();
                if(data.nev === "Buzás Benedek") return;
                listDiv.innerHTML += `<div class="user-item"><span>${data.nev} (${data.rang})</span><button onclick="makeAdmin('${data.nev}')">ADMIN</button></div>`;
            });
        }

        window.makeAdmin = async (target) => {
            await updateDoc(doc(db, "felhasznolok", target), { rang: "admin" });
            notify(target + " admin lett");
            loadUserList();
        };

        window.step = async (val) => {
            if(!currentUser || currentUser.rang !== "admin") return;
            const snap = await getDoc(docRef);
            await updateDoc(docRef, { offset: (snap.data().offset || 0) + val });
            notify(translations[currentLang].notifyWeek);
        };

        onSnapshot(docRef, (snap) => {
            if (snap.exists()) {
                const { nevsor, offset } = snap.data();
                const d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate() + 4 - (d.getDay()||7));
                const week = Math.ceil((((d - new Date(d.getFullYear(),0,1)) / 86400000) + 1)/7);
                const idx = ((week + (offset || 0) - 1) % nevsor.length + nevsor.length) % nevsor.length;
                const pair = nevsor[idx] || { a: "-", b: "-" };
                document.getElementById('names-area').innerHTML = `<div class="name-box">${pair.a}</div><div class="name-box">${pair.b}</div>`;
            }
        });

        updateUI();
    </script>
</body>
</html>
