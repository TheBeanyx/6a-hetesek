<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <title>6A Hetesek - NAPLÓ</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg: #050a14; 
            --bg-gradient: radial-gradient(circle at center, #111827 0%, #050a14 100%);
            --card: #111827;
            --accent: #00f6ff; --error: #ff4444; --text: #e2e8f0;
            --input-bg: #070c16; --input-border: #333;
        }

        body {
            margin: 0; font-family: 'Lora', sans-serif; 
            background: var(--bg-gradient); background-attachment: fixed;
            color: var(--text); display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 20px;
        }

        .log-container, .login-box {
            background: var(--card); border: 1px solid var(--accent); border-radius: 25px;
            padding: 30px; width: 100%; max-width: 1150px; margin-bottom: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); animation: zoomFade 0.6s ease;
        }

        input { 
            width: 100%; padding: 15px; margin: 10px 0; 
            background: var(--input-bg); border: 1px solid var(--accent); 
            color: var(--text); border-radius: 12px; box-sizing: border-box;
            box-shadow: inset 0 0 10px rgba(0, 246, 255, 0.1);
            font-family: 'Lora', sans-serif; outline: none; transition: 0.3s;
        }
        input:focus { box-shadow: 0 0 15px rgba(0, 246, 255, 0.4); }

        #details-popup {
            display: none; position: fixed; background: #0b1222; border: 1px solid var(--accent);
            padding: 15px; border-radius: 12px; z-index: 9999; pointer-events: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); font-size: 0.85rem; border-left: 5px solid var(--accent);
        }

        .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .tab-btn { 
            background: rgba(0, 246, 255, 0.05); border: 1px solid var(--accent); 
            color: var(--accent); padding: 10px 18px; border-radius: 20px; cursor: pointer; transition: 0.3s; font-size: 0.85rem;
        }
        .tab-btn.active { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }

        .chart-nav { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 15px; }
        .nav-arrow { background: none; border: 1px solid var(--accent); color: var(--accent); border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 1.2rem; }
        .nav-arrow:hover { background: var(--accent); color: #000; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px; border: 1px solid rgba(0,246,255,0.2); text-align: center; }
        .stat-val { display: block; font-size: 2rem; font-weight: bold; color: var(--accent); }

        .chart-container { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 25px; height: 400px; border: 1px solid rgba(0,246,255,0.1); }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(128,128,128,0.1); }
        .log-row:hover { background: rgba(0, 246, 255, 0.08); cursor: help; }
        .badge-rank { background: var(--accent); color: #000; padding: 2px 8px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; }

        .btn-main { background: var(--card); border: 1px solid var(--accent); color: var(--accent); padding: 12px 25px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        
        @keyframes zoomFade { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="details-popup"></div>

    <div id="lock-screen" class="login-box" style="text-align:center;">
        <h2 style="color:var(--accent); letter-spacing: 2px;">🔒 6A Hetesek - NAPLÓ</h2>
        <input type="email" id="adm-email" placeholder="Adminisztrátor e-mail">
        <input type="password" id="adm-pass" placeholder="Jelszó">
        <button class="btn-main" onclick="adminLogin()" style="width:100%; margin-top:10px;">BELÉPÉS</button>
    </div>

    <div id="full-logs" class="log-container" style="display:none;">
        <div class="tabs">
            <button class="tab-btn active" onclick="setFilter('all', this)">📈Összes Aktivítás</button>
            <button class="tab-btn" onclick="setFilter('weekly', this)">⚙️Heti Aktivítás</button>
            <button class="tab-btn" onclick="setFilter('auth', this)">🎖️Fiók & Rang Műveletek</button>
            <button class="tab-btn" onclick="setFilter('error', this)">❌Sikertelen Aktivítás</button>
            <button class="tab-btn" onclick="setFilter('stats', this)">📊 Statisztikai Grafikonok</button>
        </div>

        <div id="main-view">
            <input type="text" id="user-search" placeholder="Keresés névre, e-mailre vagy konkrét eseményre (pl. rang)..." oninput="renderLogs()">
            <div style="overflow-x: auto; margin-top:10px;">
                <table>
                    <thead>
                        <tr><th>Időpont</th><th>Felhasználó</th><th>Esemény</th><th>Részlet</th></tr>
                    </thead>
                    <tbody id="log-table-body"></tbody>
                </table>
            </div>
        </div>

        <div id="stats-view" style="display:none;">
            <div class="stats-grid">
                <div class="stat-card">Összes esemény<span class="stat-val" id="stat-total">0</span></div>
                <div class="stat-card">Rang módosítások<span class="stat-val" id="stat-ranks">0</span></div>
                <div class="stat-card">Biztonsági riasztás<span class="stat-val" id="stat-errs" style="color:var(--error)">0</span></div>
            </div>

            <div class="chart-nav">
                <button class="nav-arrow" onclick="changeChart(-1)">❮</button>
                <h3 id="chart-title" style="color:var(--accent); min-width:250px; text-align:center;">-</h3>
                <button class="nav-arrow" onclick="changeChart(1)">❯</button>
            </div>

            <div class="chart-container">
                <canvas id="analyticsChart"></canvas>
            </div>
        </div>

        <div style="text-align:center; margin-top:30px; display:flex; justify-content:center; gap:15px;">
            <button class="btn-main" onclick="location.href='hetesek.html'">VISSZA A FŐOLDALRA</button>
            <button class="btn-main" onclick="logout()" style="color:var(--error); border-color:var(--error);">KIJELENTKEZÉS</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, getDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCTBGoX-vztuuxOzLz7gkFA4bqiMvKuEwI",
            authDomain: "hetesek-6.firebaseapp.com",
            projectId: "hetesek-6",
            storageBucket: "hetesek-6.firebasestorage.app",
            messagingSenderId: "429344638911",
            appId: "1:429344638911:web:a4dc1bedc94caad6d1830a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let allLogs = [];
        let currentFilter = 'all';
        let chartIndex = 0;
        let myChart = null;

        const chartTypes = [
            { id: 'daily', title: '📈 Napi Összes Aktivítás' },
            { id: 'ranks', title: '🎖️ Rangmódosítások megoszlása' },
            { id: 'auth_types', title: '👤 Fiók műveletek (Be/Ki/Profil)' },
            { id: 'errors', title: '⚠️ Sikertelen belépések' },
            { id: 'weekly_actions', title: '🗓️ Heti beosztás módosítások' }
        ];

        window.adminLogin = () => {
            signInWithEmailAndPassword(auth, document.getElementById('adm-email').value, document.getElementById('adm-pass').value)
                .catch(err => alert("Hiba: " + err.message));
        };

        window.logout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "felhasznolok", user.uid));
                if (snap.exists() && (snap.data().rang === "superadmin" || snap.data().rang === "admin")) {
                    document.getElementById('lock-screen').style.display = 'none';
                    document.getElementById('full-logs').style.display = 'block';
                    loadData();
                }
            }
        });

        function loadData() {
            onSnapshot(query(collection(db, "naplo"), orderBy("idopont", "desc")), (snap) => {
                allLogs = [];
                snap.forEach(d => allLogs.push(d.data()));
                renderLogs();
                updateStats();
                if(currentFilter === 'stats') updateChart();
            });
        }

        window.setFilter = (f, btn) => {
            currentFilter = f;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('main-view').style.display = f === 'stats' ? 'none' : 'block';
            document.getElementById('stats-view').style.display = f === 'stats' ? 'block' : 'none';
            if(f === 'stats') updateChart();
            renderLogs();
        };

        window.renderLogs = () => {
            const tbody = document.getElementById('log-table-body');
            const search = document.getElementById('user-search').value.toLowerCase();
            tbody.innerHTML = "";

            allLogs.filter(l => {
                const text = (l.felhasznalo + l.esemeny).toLowerCase();
                const matchesSearch = text.includes(search);
                if (currentFilter === 'weekly') return matchesSearch && (l.esemeny.includes("Léptetés") || l.esemeny.includes("Szünet"));
                if (currentFilter === 'auth') return matchesSearch && (l.esemeny.includes("Profil") || l.esemeny.includes("Jelszó") || l.esemeny.includes("Belépés") || l.esemeny.includes("Kilépés") || l.esemeny.includes("rang"));
                if (currentFilter === 'error') return matchesSearch && (l.esemeny.toLowerCase().includes("hiba") || l.esemeny.toLowerCase().includes("sikertelen"));
                return matchesSearch;
            }).forEach(l => {
                const tr = document.createElement('tr');
                tr.className = 'log-row';
                const isRank = l.esemeny.includes("rang");
                
                tr.innerHTML = `
                    <td>${l.idopont?.toDate().toLocaleString('hu-HU') || '...'}</td>
                    <td><b>${l.felhasznalo}</b></td>
                    <td>${isRank ? `<span class="badge-rank">RANG</span> ${l.esemeny}` : l.esemeny}</td>
                    <td style="font-size:0.75rem; opacity:0.6;">${l.os || 'N/A'}</td>
                `;

                tr.onmousemove = (e) => {
                    const pop = document.getElementById('details-popup');
                    pop.style.display = 'block';
                    pop.style.left = (e.clientX + 15) + 'px';
                    pop.style.top = (e.clientY + 15) + 'px';
                    pop.innerHTML = `
                        <strong>Műveleti részletek:</strong><br>
                        👤 Felhasználó: ${l.felhasznalo}<br>
                        📝 Esemény: ${l.esemeny}<br>
                        💻 Rendszer: ${l.os} (${l.browser})<br>
                        📍 Felbontás: ${l.res}
                    `;
                };
                tr.onmouseleave = () => document.getElementById('details-popup').style.display = 'none';
                tbody.appendChild(tr);
            });
        };

        function updateStats() {
            document.getElementById('stat-total').innerText = allLogs.length;
            document.getElementById('stat-ranks').innerText = allLogs.filter(l => l.esemeny.includes("rang")).length;
            document.getElementById('stat-errs').innerText = allLogs.filter(l => l.esemeny.toLowerCase().includes("hiba") || l.esemeny.toLowerCase().includes("sikertelen")).length;
        }

        window.changeChart = (dir) => {
            chartIndex = (chartIndex + dir + chartTypes.length) % chartTypes.length;
            updateChart();
        };

        function updateChart() {
            const ctx = document.getElementById('analyticsChart').getContext('2d');
            const type = chartTypes[chartIndex];
            document.getElementById('chart-title').innerText = type.title;
            if(myChart) myChart.destroy();

            let labels = [], data = [], chartStyle = 'line', color = '#00f6ff';

            if(type.id === 'daily') {
                const days = {};
                allLogs.slice(0, 100).forEach(l => days[l.datum] = (days[l.datum] || 0) + 1);
                labels = Object.keys(days).reverse(); data = Object.values(days).reverse();
            } else if(type.id === 'ranks') {
                const rData = { 'Adott rangot': 0, 'Kapott rangot': 0 };
                allLogs.forEach(l => {
                    if(l.esemeny.includes("rangot adott")) rData['Adott rangot']++;
                    if(l.esemeny.includes("rangot kapott")) rData['Kapott rangot']++;
                });
                labels = Object.keys(rData); data = Object.values(rData);
                chartStyle = 'pie';
            } else if(type.id === 'auth_types') {
                const counts = { 'Belépés': 0, 'Kilépés': 0, 'Profil': 0, 'Rang': 0 };
                allLogs.forEach(l => {
                    if(l.esemeny.includes("Belépés")) counts['Belépés']++;
                    if(l.esemeny.includes("Kilépés")) counts['Kilépés']++;
                    if(l.esemeny.includes("Profil")) counts['Profil']++;
                    if(l.esemeny.includes("rang")) counts['Rang']++;
                });
                labels = Object.keys(counts); data = Object.values(counts);
                chartStyle = 'bar';
            } else if(type.id === 'errors') {
                const errs = {};
                allLogs.filter(l => l.esemeny.toLowerCase().includes("sikertelen")).forEach(l => errs[l.datum] = (errs[l.datum] || 0) + 1);
                labels = Object.keys(errs); data = Object.values(errs);
                color = '#ff4444';
            } else if(type.id === 'weekly_actions') {
                const steps = {};
                allLogs.filter(l => l.esemeny.includes("Léptetés")).forEach(l => steps[l.datum] = (steps[l.datum] || 0) + 1);
                labels = Object.keys(steps); data = Object.values(steps);
            }

            myChart = new Chart(ctx, {
                type: chartStyle,
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Eseményszám',
                        data: data,
                        borderColor: color,
                        backgroundColor: chartStyle === 'pie' ? ['#00f6ff', '#7000ff', '#ff4444', '#00ff70'] : color + '33',
                        fill: true, tension: 0.4
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#fff' } } },
                    scales: chartStyle !== 'pie' ? {
                        y: { grid: { color: '#333' }, ticks: { color: '#aaa' } },
                        x: { grid: { color: '#333' }, ticks: { color: '#aaa' } }
                    } : {}
                }
            });
        }
    </script>
</body>
</html>
